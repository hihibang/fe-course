<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal(ALL) Slecter</title>
    <meta name="description" content=""Universal(ALL) Slecter>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <style>

        :root {
            /* 공통 프로퍼티를 변수로 정의 */
            --color-main: aquamarine;
            --color-font: red;
        }

        * {
            background-color: var(--color-main);
            /* 전체 영역에서 스타일을 지정할 경우*/
            font-family: "Open sanse", sans-serif;
            margin: 0%; /* 요소 테두리에 안보이는 여백을 조정, 0% > 여백이 없음 */
        }
        h1, div{
            background-color: tomato;
            color: var(--color-font);
        }
        h3 {
            background-color: aqua;
        }
        p {
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <h1>Universal(ALL) Slecter</h1>
    <div>
        <h3>sub title</h3>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Vitae obcaecati commodi laudantium quae sunt laboriosam dicta voluptates dolorum quos maxime officiis quia, aut similique? Corporis itaque est aut incidunt? Ut?</p>
    </div>
</body>
</html>
