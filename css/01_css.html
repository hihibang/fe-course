<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <meta name="description" content="CSS">

    <style>
        h2 {
            color: green;
        }
        span {
            color: red;
        }
    </style>
    <link rel="stylesheet" href="01_css.css">
</head>
<body>
    <!-- 
        1. Inline: HTML Element에 CSS Style 속성 추가
        2. Internal: HTML <Head> Element에 <style> 추가
        3. External: style 속성을 별도의 .css 파일에 저장하고 필요시 <link>로 호출.
    -->
    <h1 style="color: blue;">CSS 사용법</h1>
    
    <h2><span>1.</span> Inline</h2>
    <h2><span>2.</span> Internal</h2>
    <h2><span>3.</span> External</h2>

</body>
</html>
