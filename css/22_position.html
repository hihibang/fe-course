<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .bg-wrap {  
            border: 1px red solid;
            width: 100%;
            height: 300px;
            background-image: url(../images/patten1.jpg);
            background-repeat: no-repeat;
            background-position: 50% 50%; /* 배경의 위치, 정가운데 설정 */
            /* background-size: cover; 이미지를 공간을 다 채우기 위해 강제로 늘림        */
            /* background-size: contain;  브라우저 너비에 맞춰 채워짐 */
            background-size: auto; /* 원래 배경 이미지 크기만큼 표시 */
        }
        .starbg-wrap {
            width: 100%;
            /* height: 620px; */    
            height: 32.2vw; /* 사이즈가 고정 */ /* viewport: vw = (이미지 출력 높이 /vw너비(가로해상도)) */
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }   
    </style>
</head>
<body>
    <h1>Backgrond Position</h1>
    <div class="bg-wrap"></div>
    <div class="starbg-wrap"></div>
</body>
</html>
