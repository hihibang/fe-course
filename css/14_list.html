<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <style>
        ul {
            background-color: aqua;
            list-style-type: none;
            padding: 0px;
        }
        
        ol {
            background-color: blueviolet;
            list-style: 🥰; /* 이모지: control + command + space */
        }
        li {
            background-color: yellow;
        }
        h3 {
            border: 1px solid blue;
        }
    </style>
</head>
<body>
    <h1>List Style</h1>
    <ul>
        <h3>Front</h3>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <ol>
        <h3>Back</h3>
        <li>JSP</li>
        <li>ASP</li>
        <li>Node.js</li>
    </ol>
</body>
</html>
