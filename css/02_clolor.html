<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color</title>
    <meta name="description" content="CSS-color">

    <style>
        h2 {
            color: tomato;
        }
        h3 { color:  rgb(225, 212, 232);}
        h4 { color: rgba(30, 57, 50, 0.6);} /* 맨 마지막은 투명도 (투명)0~1 */
        h5 { color: #eb7655;}
    </style>
</head>
<body>
    <h1>CSS-colors</h1>
    <h2>color-name</h2>
    <h3>color-rgb</h3>
    <h4>color-rgba</h4>
    <h5>color-hexa</h5>
</body>
</html>
