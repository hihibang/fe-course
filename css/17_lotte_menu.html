<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotte Menu</title>
    <meta name="description" content="Lotte Menu">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        header {
            /* border:  1px seagreen solid; */
            width: 1000px; /* left 기준 */
            margin: auto;
        }
        
        .header-top {
            border-bottom: 1px #666 solid; 
            /* 전체적인 윤곽을 볼때 사용, 다 구성되면 삭제 */
            display: flex;
            justify-content: space-between; 
            /* 첫번째와 마지막을 서로의 양끝 배치/ 그 사이 나머지 요소들은 남은 공간을 똑같은 간격으로 나눠가짐*/
        }
        ul {
            /* border: 1px blue solid; */
            display: flex;
            padding: 0;
            gap: 20px;
            list-style: none;
        }
        ul a {
            text-decoration: none; /* under_line 삭제 */
            font-size: 0.8rem;
            color: #333;
        }
        .header-top-left {
            gap: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <nav>
                <ul class="header-top-left">
                    <li><a href="#"><i class="fa-brands fa-instagram"></i>인스타그램</a></li>
                    <li><a href="#"><i class="fa-brands fa-youtube"></i>유튜브</a></li>
                    <li><a href="#"><i class="fa-brands fa-facebook"></i>페이스북</a></li>
                </ul>
            </nav>
            <div>
                <img src="https://www.lottecinema.co.kr/NLCHS/Content/images/common/logo.png" 
                     alt="Logo">
            </div>
            <nav>
                <ul>
                    <li><a href="#">멤버십</a></li>
                    <li><a href="#">고객센터</a></li>
                    <li><a href="#">단체관람/대관문의</a></li>
                    <li><a href="#">로그인</a></li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
