<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Style</title>
    <style>
        .text {
            text-shadow: 10px 5px rgb(97, 89, 89, 0.5);
        }
        .box {
            width: 300px;
            height: 200px;
            -webkit-box-shadow: -35px -12px 28px 15px #000000; 
            box-shadow: -35px -12px 28px 15px #000000;
        }
    </style>
</head>
<body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-Shadow</h2>
    <h2 class="box">Box-Shadow</h2>
</body>
</html>
