<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Auto</title>
    <style>
        h1 {
            /* width: 500px; */
            /* width: 100%; 마진 오토 의미 없음 */
            width: 50%;
            height: 200px;
            background-color: aquamarine;
            margin: auto; /* 여백 자동정렬 */
        }
        div {
            width: 100%;
            height: 500px;
            background-color: tomato;
        }
        p {
            width: 600px;
            border: 1px blue solid;
            background-color: white;
            margin: auto; /* 부모인 div 기준으로 계산해야함 */
            /* 부모가 50% 60%든 자식은 100으로 보고 여백 계산 */
        }
    </style>
</head>
<body>
    <h1>Margin-Auto</h1>
    <div>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Dolores commodi
           inventore consequatur maiores perspiciatis adipisci? Delectus dolore dignissimos eos. 
           Necessitatibus aut enim ducimus tempore amet quis eaque tempora architecto nam.</p>
    </div>
</body>
</html>
