<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id Selecter</title>
    <meta name="description" content="Id Selecter">
    <style>
        * {
            margin: 0%;
        }
        /* id 선택자는 중복 선택해서 사용하지 않는 것을 추천함! */
        #h1 {
            color: tomato;
            width: 300px;
            height: 400px;
            background-color: cadetblue;
        }
        #h2 {
            color: tomato;
            background-color: yellow;
        }
        #h3 {
            color: blue;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1 id="h1">Id Selecter 1</h1>
    <h2 id="h2">Id Selecter 2</h2>
    <h3 id="h3">Id Selecter 3</h3>
</body>
</html>
