<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Relative</title>
    <style>
        h1, div, span {
            border: 1px black solid;
            position: relative; /* defalt */
        }
        span {
            border: 5px red solid;
            /* position: absolute; 부모에게 영향을 받음, 위치를 사용자가 지정 */
            position: fixed; /* 브라우저 윈도우를 기준으로 배치 */
            top: 100px; /* 양수면 홈페이지 기준 왼쪽 끝에서 음수면 위로 올라감 */
            left: 200px; /* 부모의 공간 안에서 움직임 */
        }
        .p {
            width: 600px;
            height: 300px;
            border: 2px blue solid;
            position: relative; /* 요소의 원래 위치를 기준으로 배치*/
        }
    </style>
</head>
<body>
    <h1>Position Relative</h1>
    <div>element 1</div>
    <div class="p">
    <span>element 2</span>
    </div>
</body>
</html>
