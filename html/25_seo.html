<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO</title>
    <meta name="description" content="SEO 개념 익히기">
</head>
<body>
    <!--
        SEO(Search Engine Opitimization) - 검색 엔진 최적화
        개념: 검색 엔진에서 상위 노출되도록 웹사이트를 최적화하는 기술
             HTML5에 나타난 개념.
        검색 엔진: 구글, 네이버, 마이크로소프트
        
        SEO 기술
        - HTML5 semantic Tag: header, main, footer
        - title
        - meta description
        - heading Tag
        - content: <img-alt, <label-for ...

        SEO를 적용 사이트
        - 블로그, 쇼핑몰, 교육사이트 ...
    -->

    <!--<h1>HTML4 Layout</h1>
    <div id="header">Header</div>
    <div id="content">Content</div>
    <div id="footer">Footer</div>-->

    <h1>HTML5 Layout</h1>
    <header>header</header>
    <main>content</main>
    <footer>footer</footer>

</body>
</html>
