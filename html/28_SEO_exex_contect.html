<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습_교육상담폼.</title>
    <meta name="description" content="SEO 보완"

</head>
<body>
    <header>
    <h1>웹 개발 교육 상담 문의</h1>

    <p>HTML, CSS, JAvaScript, React, 프론트엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담당자가 확인 후 안내해드립니다.</p>
    </header>
    <main>
    <form action="#" method="GET">
    <fieldset>
        <legend>상담 신청 정보</legend>

        <div>
            <label for="name">이름 <sup>*</sup></label>
            <input type="text" name="name" id="id" placeholder="이름을 입력하세요"><br>
            <p>실명을 입력해 주세요.</p>
        </div>
        <div>
            <label for="email">이메일 <sup>*</sup></label>
            <input type="email" name="email" id="email" placeholder="example@email.com"><br>
            <p>답변을 받을 이메일 주소를 입력해 주세요.</p>
        </div>
        <div>
            <label for="number">연락처</label>
            <input type="number" name="number" id="number" placeholder="010-0000-0000"><br>
            <label for="select">관심 과정 <sup>*</sup></label>
                <select id="select">
                    <option value="select">선택하세요</option>
                    <option value="html/css">HTML/CSS 기초</option>
                    <option value="javaScript">JavaScript 입문</option>
                    <option value="react">React 프론트엔드</option>
                    <option value="fullstack">Fullstack 웹 개발</option>
                </select><br>
                <label for="intro">문의 내용 <sup>*</sup></label>
                <textarea name="coment" id="coment"
                 placeholder="궁금한 내용을 자세히 입력해 주세요."></textarea><br>
                <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
            </div>

        <div>
            <input type="checkbox" name="cheak" id="cheak">
            <label for="cheak">개인정보 수집 및 이용에 동의합니다. <sup>*</sup></span><br>
        </div>
        <div>
            <button type="submit">상담 문의 보내기</button>
        </div>
    </fieldset>
    </form>
    </main>

    <footer></footer>

</body>
</html>
